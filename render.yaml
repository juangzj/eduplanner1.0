services:
  - type: web
    name: eduplanner
    runtime: python:3.12
    region: ohio
    buildCommand: |
      pip install -r requirements.txt && \
      python manage.py collectstatic --noinput --clear && \
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: 'False'
      - fromGroup: env_vars
