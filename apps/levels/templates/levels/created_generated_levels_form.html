<div class="card shadow-sm border-0">
    
    <div class="card-header bg-white border-bottom py-2">
        <h6 class="mb-0 fw-semibold">
            Completar niveles (manual o con IA)
        </h6>
    </div>

    <div class="card-body pt-3">

        <form method="post">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="alert alert-danger py-2">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <!-- PLANTILLA -->
            <div class="mb-3">
                <label class="form-label small fw-semibold">Plantilla seleccionada</label>
                {{ form.performance_template }}
                {{ form.performance_template.errors }}
            </div>

            <hr class="my-3">

            <div class="mb-2">
                <label class="form-label small fw-semibold">Nivel bajo</label>
                {{ form.low_level }}
            </div>

            <div class="mb-2">
                <label class="form-label small fw-semibold">Nivel básico</label>
                {{ form.basic_level }}
            </div>

            <div class="mb-2">
                <label class="form-label small fw-semibold">Nivel alto</label>
                {{ form.high_level }}
            </div>

            <div class="mb-3">
                <label class="form-label small fw-semibold">Nivel superior</label>
                {{ form.superior_level }}
            </div>

            <div class="d-flex justify-content-end">
                <button type="submit" class="btn btn-sm btn-primary">
                    Guardar niveles
                </button>
            </div>

        </form>

    </div>
</div>
