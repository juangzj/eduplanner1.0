<div class="card shadow-sm border-0 mb-3">
    <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-semibold">Prompt Generado</h5>
        <span class="badge text-bg-primary">Puntaje: {{ prompt.score|default:"N/A" }}/10</span>
    </div>
    <div class="card-body">
        <pre class="mb-0" style="white-space: pre-wrap; word-break: break-word;">{{ prompt.full_prompt }}</pre>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-header bg-white border-bottom py-3">
        <h6 class="mb-0 fw-semibold">Retroalimentacion Automatica</h6>
    </div>
    <div class="card-body">
        {% if feedback_items %}
            <ul class="mb-0">
                {% for item in feedback_items %}
                    <li>{{ item }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="mb-0 text-muted">No hay retroalimentacion disponible.</p>
        {% endif %}
    </div>
</div>
