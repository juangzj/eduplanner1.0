{% extends "base/base_left_sidebar.html" %}

{% block title %}Detalle del Prompt{% endblock %}

{% block extra_css %}
{{ block.super }}
<style>
    .attempt-grid {
        display: grid;
        grid-template-columns: repeat(1, minmax(0, 1fr));
        gap: 0.75rem;
    }

    .attempt-section {
        border: 1px solid #dbe4f0;
        background: #f8fbff;
        border-radius: 12px;
        padding: 0.9rem;
    }

    .attempt-section-title {
        font-size: 0.84rem;
        font-weight: 700;
        letter-spacing: 0.2px;
        text-transform: uppercase;
        color: #1f4b8f;
        margin-bottom: 0.35rem;
    }

    .attempt-section-body {
        margin: 0;
        color: #26344a;
        line-height: 1.45;
        white-space: pre-wrap;
    }

    .feedback-stack {
        display: grid;
        gap: 0.65rem;
    }

    .feedback-block {
        border: 1px solid #d3efe2;
        background: #eefaf4;
        border-radius: 12px;
        padding: 0.8rem 0.9rem;
    }

    .feedback-title {
        font-size: 0.84rem;
        font-weight: 700;
        text-transform: uppercase;
        color: #0e6a4e;
        margin-bottom: 0.35rem;
    }

    .feedback-list {
        margin: 0;
        padding-left: 1.1rem;
        color: #184736;
    }

    @media (min-width: 992px) {
        .attempt-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
    }
</style>
{% endblock %}

{% block sidebar_content %}
<div class="container-fluid">
    <div class="row mb-3">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Resultado del Prompt</h4>
            <a href="{% url 'prompt_lab:prompt-create' %}" class="btn btn-outline-secondary btn-sm">Crear Nuevo Prompt</a>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-xl-10">
            {% include "prompt_lab/prompt_detail_content.html" %}
        </div>
    </div>
</div>
{% endblock %}
