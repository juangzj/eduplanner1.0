services:
  db:
    image: postgres:18
    container_name: eduplanner_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    networks:
      - eduplanner_net

networks:
  eduplanner_net:
    ipam:
      config:
        - subnet: 192.168.100.0/24